name: Cognitive Healium CI

on:
  # This makes the CI test wait until the Frontend Deployment is 100% done!
  workflow_run:
    workflows: ["Deploy Frontend to GitHub Pages"]
    types:
      - completed
  workflow_dispatch: # Allows you to manually trigger it too

env:
  PYTHON_VERSION: "3.11"

jobs:
  test-live-production:
    name: Production E2E Test (Live Site)
    runs-on: ubuntu-latest
    # Only run if the deployment succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Cognitive Healium SDK
        run: |
          pip install --upgrade pip
          pip install .
          playwright install chromium --with-deps

      - name: Run Live Production Test
        env:
          GROQ_API_KEYS: ${{ secrets.GROQ_API_KEYS }}
          DEPLOYED_URL: https://aryankorrai18.github.io/cognitive-healium/
        run: pytest tests/test_deployed_site.py -v --tb=short
        continue-on-error: true
