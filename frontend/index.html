<!-- frontend/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cognitive Healium - Test Page</title>
  <style>
    body { font-family: sans-serif; padding: 40px; background: #f5f5f5; }
    input { padding: 10px; font-size: 16px; width: 300px; border: 2px solid #ccc; border-radius: 6px; }
    button { padding: 10px 20px; font-size: 16px; margin-left: 8px; cursor: pointer; }
    #result { margin-top: 20px; font-size: 18px; color: #2e7d32; }
  </style>
</head>
<body>
  <h2>Healium Test Page</h2>

  <!-- DEV CHANGED THE ID HERE FROM "search-input" to "search-bar-v3" -->
  <input
    id="search-bar-v3"
    class="search-bar"
    name="q"
    placeholder="Search products..."
    type="text"
  />
  <button id="search-btn" onclick="showResult()">Search</button>

  <div id="result"></div>

  <script>
    function showResult() {
      const val = document.querySelector('input').value;
      document.getElementById('result').textContent =
        val ? 'Searched for: ' + val : 'Empty search';
    }
  </script>
</body>
</html>
